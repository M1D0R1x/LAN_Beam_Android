<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LAN Beam</title>
<style>
:root {
  --bg: #0c0c10; --card: #16161e; --card2: #1a1a26; --border: #262630;
  --text: #eeeef2; --text2: #8888a0; --primary: #818cf8; --primary-dim: rgba(129,140,248,0.15);
  --success: #4ade80; --error: #f87171; --warning: #fbbf24;
  --radius: 14px; --radius-sm: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; overflow-x:hidden; }
a { color:var(--primary); text-decoration:none; }
button { font-family:inherit; cursor:pointer; border:none; outline:none; }

/* Scrollbar */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

/* Page Container */
.page { display:none; flex:1; flex-direction:column; overflow-y:auto; padding:16px; padding-bottom:80px; transition:padding-bottom .2s; }
.page.active { display:flex; }
body.select-mode .page { padding-bottom:150px; }

/* Bottom Nav */
.nav { position:fixed; bottom:0; left:0; right:0; background:var(--card); border-top:1px solid var(--border); display:flex; z-index:100; padding:6px 0; padding-bottom:max(6px,env(safe-area-inset-bottom)); }
.nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:8px 4px; background:none; color:var(--text2); font-size:10px; font-weight:600; transition:color .2s; position:relative; min-height:48px; justify-content:center; }
.nav-btn.active { color:var(--primary); }
.nav-btn .icon { font-size:20px; line-height:1; }
.nav-dot { position:absolute; top:6px; right:calc(50% - 16px); width:7px; height:7px; border-radius:50%; }
.nav-dot.online { background:var(--success); box-shadow:0 0 6px var(--success); }
.nav-dot.offline { background:var(--error); }

/* Cards */
.card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:12px; }
.card-title { font-size:14px; font-weight:700; color:var(--text); margin-bottom:10px; display:flex; align-items:center; gap:8px; }

/* QR */
.qr-wrap { display:flex; justify-content:center; padding:12px 0; }
.qr-wrap img { width:180px; height:180px; border-radius:12px; border:2px solid var(--border); }

/* URL Bar */
.url-bar { display:flex; align-items:center; gap:10px; background:var(--card2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px 14px; cursor:pointer; transition:border-color .2s; }
.url-bar:active { border-color:var(--primary); }
.url-bar .url-text { flex:1; font-size:14px; font-weight:700; color:var(--primary); font-family:monospace; }
.url-bar .copy-icon { font-size:16px; transition:transform .15s; }
.url-bar.copied { border-color:var(--success); }
.url-bar.copied .copy-icon { transform:scale(1.3); }

/* Stats Grid */
.stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.stat-item { background:var(--card2); border-radius:var(--radius-sm); padding:12px; text-align:center; }
.stat-value { font-size:18px; font-weight:800; color:var(--text); }
.stat-label { font-size:10px; color:var(--text2); margin-top:2px; text-transform:uppercase; letter-spacing:.5px; }

/* File List */
.file-item { display:flex; align-items:center; gap:12px; padding:12px; background:var(--card); border:1px solid var(--border); border-radius:var(--radius-sm); margin-bottom:6px; cursor:pointer; transition:background .15s, border-color .15s; min-height:56px; position:relative; }
.file-item:active { background:var(--card2); }
.file-item.selected { background:var(--primary-dim); border-color:var(--primary); }
.file-icon { width:40px; height:40px; display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; border-radius:6px; overflow:hidden; background:var(--card2); }
.file-icon img { width:100%; height:100%; object-fit:cover; }
.file-info { flex:1; min-width:0; }
.file-name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.file-meta { font-size:11px; color:var(--text2); margin-top:2px; }
.file-check { width:22px; height:22px; border-radius:6px; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:14px; transition:all .15s; }
.file-item.selected .file-check { background:var(--primary); border-color:var(--primary); color:white; }
.file-actions { display:flex; gap:6px; flex-shrink:0; }
.file-actions button { width:36px; height:36px; border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center; font-size:16px; transition:background .15s; }
.btn-download { background:var(--primary-dim); color:var(--primary); }
.btn-download:active { background:var(--primary); color:white; }
.btn-delete { background:rgba(248,113,113,0.12); color:var(--error); }
.btn-delete:active { background:var(--error); color:white; }

/* Breadcrumb */
.breadcrumb { display:flex; align-items:center; gap:6px; padding:8px 0; flex-wrap:wrap; margin-bottom:8px; }
.breadcrumb button { background:none; color:var(--text2); font-size:12px; font-weight:600; padding:4px 8px; border-radius:6px; transition:all .15s; min-height:32px; }
.breadcrumb button:hover, .breadcrumb button:active { color:var(--primary); background:var(--primary-dim); }
.breadcrumb .sep { color:var(--border); font-size:12px; }
.back-btn { background:var(--card) !important; border:1px solid var(--border) !important; color:var(--text) !important; padding:6px 12px !important; border-radius:var(--radius-sm) !important; font-size:13px !important; font-weight:700 !important; min-height:36px !important; }
.file-count { font-size:11px; color:var(--text2); margin-bottom:10px; }

/* Skeleton */
.skeleton { background:linear-gradient(90deg, var(--card) 25%, var(--card2) 50%, var(--card) 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:var(--radius-sm); }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.skel-item { height:56px; margin-bottom:6px; }

/* Empty State */
.empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; text-align:center; }
.empty-icon { font-size:48px; margin-bottom:12px; opacity:0.5; }
.empty-title { font-size:15px; font-weight:700; color:var(--text); margin-bottom:4px; }
.empty-desc { font-size:12px; color:var(--text2); }

/* Upload Zone */
.upload-zone { border:2px dashed var(--border); border-radius:var(--radius); padding:30px; text-align:center; transition:all .2s; cursor:pointer; margin-bottom:12px; }
.upload-zone.dragover { border-color:var(--primary); background:var(--primary-dim); }
.upload-zone-icon { font-size:36px; margin-bottom:8px; }
.upload-zone-text { font-size:13px; color:var(--text2); }
.upload-zone-text strong { color:var(--primary); }

/* Upload Queue */
.upload-queue { margin-bottom:12px; }
.upload-q-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.upload-q-title { font-size:13px; font-weight:700; }
.upload-q-clear { background:none; color:var(--error); font-size:11px; font-weight:700; padding:4px 8px; border-radius:6px; }
.uq-item { display:flex; align-items:center; gap:10px; padding:8px 10px; background:var(--card); border:1px solid var(--border); border-radius:var(--radius-sm); margin-bottom:4px; }
.uq-icon { font-size:18px; width:28px; text-align:center; }
.uq-info { flex:1; min-width:0; }
.uq-name { font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.uq-size { font-size:10px; color:var(--text2); }
.uq-remove { background:none; color:var(--error); font-size:14px; width:28px; height:28px; display:flex; align-items:center; justify-content:center; border-radius:6px; }
.uq-progress { height:3px; background:var(--border); border-radius:2px; margin-top:4px; overflow:hidden; }
.uq-progress-bar { height:100%; background:var(--primary); border-radius:2px; transition:width .3s; }
.uq-done .uq-progress-bar { background:var(--success); }

/* Overall Upload Progress */
.upload-progress { margin-bottom:12px; }
.up-bar { height:6px; background:var(--border); border-radius:4px; overflow:hidden; margin-top:6px; }
.up-bar-fill { height:100%; background:linear-gradient(90deg,var(--primary),#a78bfa); border-radius:4px; transition:width .3s; }
.up-status { font-size:12px; color:var(--text2); display:flex; justify-content:space-between; }

/* Upload Button */
.upload-btn { width:100%; padding:14px; background:var(--primary); color:white; font-size:14px; font-weight:700; border-radius:var(--radius-sm); transition:opacity .15s; }
.upload-btn:disabled { opacity:0.4; }

/* Download Overlay */
.dl-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:200; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(6px); }
.dl-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:24px; width:min(340px,90vw); text-align:center; }
.dl-icon { font-size:48px; margin-bottom:12px; }
.dl-title { font-size:15px; font-weight:700; margin-bottom:4px; }
.dl-subtitle { font-size:12px; color:var(--text2); margin-bottom:16px; word-break:break-all; }
.dl-progress { height:6px; background:var(--border); border-radius:4px; overflow:hidden; margin-bottom:10px; }
.dl-progress-bar { height:100%; background:linear-gradient(90deg,var(--primary),#a78bfa); border-radius:4px; transition:width .2s; }
.dl-stats { display:flex; justify-content:space-between; font-size:11px; color:var(--text2); margin-bottom:14px; }
.dl-cancel { padding:10px 24px; background:var(--border); color:var(--text); font-size:13px; font-weight:600; border-radius:var(--radius-sm); }
.dl-done .dl-icon { color:var(--success); }

/* Preview Overlay */
.preview-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:250; display:flex; flex-direction:column; align-items:center; justify-content:center; backdrop-filter:blur(8px); }
.preview-close { position:absolute; top:12px; right:16px; background:rgba(255,255,255,0.1); color:white; width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; z-index:260; }
.preview-close:active { background:rgba(255,255,255,0.25); }
.preview-actions { position:absolute; bottom:max(20px,env(safe-area-inset-bottom)); display:flex; gap:10px; z-index:260; }
.preview-actions button { padding:10px 20px; border-radius:var(--radius-sm); font-size:13px; font-weight:700; }
.preview-dl-btn { background:var(--primary); color:white; }
.preview-img { max-width:95vw; max-height:80vh; object-fit:contain; border-radius:8px; }
.preview-media { max-width:95vw; max-height:70vh; border-radius:8px; outline:none; }

/* Multi-select bar */
.select-bar { position:fixed; bottom:calc(76px + env(safe-area-inset-bottom, 0px)); left:8px; right:8px; background:var(--card); border:1px solid var(--primary); border-radius:var(--radius); padding:12px 14px; z-index:150; display:flex; align-items:center; gap:8px; box-shadow:0 -4px 24px rgba(0,0,0,0.6), 0 0 0 1px rgba(129,140,248,0.2); animation:slideUp .25s cubic-bezier(.4,0,.2,1); }
@keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
.select-bar .sel-count { flex:1; font-size:13px; font-weight:700; white-space:nowrap; }
.select-bar button { padding:8px 14px; border-radius:var(--radius-sm); font-size:12px; font-weight:700; white-space:nowrap; min-height:36px; }
.sel-zip-btn { background:var(--primary); color:white; }
.sel-all-btn { background:var(--card2); color:var(--text2); border:1px solid var(--border); }
.sel-cancel-btn { background:var(--card2); color:var(--error); border:1px solid var(--border); }

/* Toast */
.toast { position:fixed; top:16px; left:50%; transform:translateX(-50%) translateY(-100px); background:var(--card); border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px 18px; font-size:13px; font-weight:600; z-index:300; transition:transform .3s cubic-bezier(.4,0,.2,1); max-width:90vw; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.toast.show { transform:translateX(-50%) translateY(0); }
.toast.success { border-left:3px solid var(--success); }
.toast.error { border-left:3px solid var(--error); }

/* Retry */
.retry-btn { margin-top:12px; padding:10px 24px; background:var(--primary); color:white; font-size:13px; font-weight:700; border-radius:var(--radius-sm); }

/* Misc */
.hidden { display:none !important; }
</style>
</head>
<body>

<!-- Toast -->
<div id="toast" class="toast"></div>

<!-- Pages -->
<div id="page-home" class="page active">
  <div class="card">
    <div class="card-title">📡 Device Info</div>
    <div id="home-device" style="font-size:13px;color:var(--text2);margin-bottom:12px">Loading...</div>
    <div class="url-bar" id="url-bar" onclick="copyUrl()">
      <span class="url-text" id="url-text">http://...</span>
      <span class="copy-icon" id="copy-icon">📋</span>
    </div>
  </div>
  <div class="qr-wrap"><img id="qr-img" src="/api/qr" alt="QR Code"></div>
  <div class="stats-grid" id="stats-grid">
    <div class="stat-item"><div class="stat-value" id="stat-files">-</div><div class="stat-label">Files Shared</div></div>
    <div class="stat-item"><div class="stat-value" id="stat-size">-</div><div class="stat-label">Total Size</div></div>
    <div class="stat-item"><div class="stat-value" id="stat-hostname">-</div><div class="stat-label">Hostname</div></div>
    <div class="stat-item"><div class="stat-value" id="stat-conn">Wi-Fi</div><div class="stat-label">Connection</div></div>
  </div>
</div>

<div id="page-send" class="page">
  <div class="breadcrumb" id="breadcrumb"></div>
  <div class="file-count" id="send-count"></div>
  <div id="send-list"></div>
</div>

<div id="page-receive" class="page">
  <div class="card-title" style="margin-bottom:12px">📥 Upload Files</div>
  <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
    <div class="upload-zone-icon">📁</div>
    <div class="upload-zone-text">Tap to select or <strong>drag files here</strong></div>
  </div>
  <input type="file" id="file-input" multiple style="display:none">
  <div id="upload-queue-wrap" class="hidden"></div>
  <div id="upload-progress-wrap" class="hidden"></div>
  <button id="upload-start-btn" class="upload-btn hidden" onclick="startUpload()">Upload Files</button>
  <div style="margin-top:16px">
    <div class="card-title">📦 Uploaded Files</div>
    <div id="receive-list"></div>
  </div>
</div>

<!-- Bottom Nav -->
<nav class="nav">
  <button class="nav-btn active" data-page="home" onclick="switchPage('home')">
    <span class="icon">🏠</span>Home
    <span class="nav-dot offline" id="conn-dot"></span>
  </button>
  <button class="nav-btn" data-page="send" onclick="switchPage('send')">
    <span class="icon">📤</span>Send
  </button>
  <button class="nav-btn" data-page="receive" onclick="switchPage('receive')">
    <span class="icon">📥</span>Receive
  </button>
</nav>

<!-- Download Overlay -->
<div id="dl-overlay" class="dl-overlay hidden"></div>

<!-- Preview Overlay -->
<div id="preview-overlay" class="preview-overlay hidden"></div>

<!-- Multi-select Bar -->
<div id="select-bar" class="select-bar hidden">
  <span class="sel-count" id="sel-count">0 selected</span>
  <button class="sel-all-btn" id="sel-all-btn" onclick="toggleSelectAll()">Select All</button>
  <button class="sel-zip-btn" onclick="downloadSelectedZip()">📦 ZIP</button>
  <button class="sel-cancel-btn" onclick="exitSelectMode()">✕</button>
</div>

<script>
// ─── State ───
let currentPage = localStorage.getItem('lb_page') || 'home';
let currentPath = '/';
let serverInfo = {};
let fileCache = {};
const FILE_CACHE_TTL = 3000;
let uploadQueue = [];
let uploading = false;
let downloadAbort = null;
let refreshTimer = null;
const POLL_WS = 60000;
const POLL_FALLBACK = 15000;

// Multi-select
let selectMode = false;
let selectedFiles = new Set();

// WebSocket
let ws = null;
let wsReconnectDelay = 1000;
let wsConnected = false;

// ─── Init ───
document.addEventListener('DOMContentLoaded', () => {
  switchPage(currentPage);
  loadInfo();
  setupUploadZone();
  startPolling();
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      closePreview();
      closeDlOverlay();
      if (selectMode) exitSelectMode();
    }
  });
});

// ─── Pages ───
function switchPage(page) {
  currentPage = page;
  localStorage.setItem('lb_page', page);
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.page === page));
  if (page === 'send') { currentPath = '/'; loadFiles('/'); }
  if (page === 'receive') { loadReceived(); }
  if (selectMode) exitSelectMode();
  window.scrollTo(0, 0);
}

// ─── Info ───
async function loadInfo() {
  try {
    const res = await fetch('/api/info');
    serverInfo = await res.json();
    document.getElementById('url-text').textContent = serverInfo.url;
    document.getElementById('home-device').textContent = serverInfo.hostname;
    document.getElementById('stat-files').textContent = serverInfo.filesShared;
    document.getElementById('stat-size').textContent = fmtSize(serverInfo.totalSize);
    document.getElementById('stat-hostname').textContent = serverInfo.hostname;
    document.getElementById('stat-conn').textContent = serverInfo.connectionType;
    // Connect WebSocket after getting info
    if (serverInfo.wsPort) connectWebSocket();
  } catch(e) { console.error('Info load error', e); }
}

// ─── WebSocket ───
function connectWebSocket() {
  if (ws && ws.readyState <= 1) return;
  const host = location.hostname;
  const port = serverInfo.wsPort || 8766;
  try {
    ws = new WebSocket('ws://' + host + ':' + port);
    ws.onopen = () => {
      wsConnected = true;
      wsReconnectDelay = 1000;
      updateConnDot();
      restartPolling();
    };
    ws.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);
        handleWsEvent(data);
      } catch(e) {}
    };
    ws.onclose = () => {
      wsConnected = false;
      updateConnDot();
      restartPolling();
      setTimeout(() => {
        wsReconnectDelay = Math.min(wsReconnectDelay * 2, 30000);
        connectWebSocket();
      }, wsReconnectDelay);
    };
    ws.onerror = () => { ws.close(); };
  } catch(e) {
    wsConnected = false;
    updateConnDot();
  }
}

function handleWsEvent(data) {
  switch(data.type) {
    case 'files_changed':
      invalidateCache();
      if (currentPage === 'send') loadFiles(currentPath);
      if (currentPage === 'receive') loadReceived();
      if (currentPage === 'home') loadInfo();
      break;
    case 'upload_complete':
      showToast('📥 New file: ' + data.file, 'success');
      invalidateCache();
      if (currentPage === 'receive') loadReceived();
      break;
    case 'file_deleted':
      invalidateCache();
      if (currentPage === 'receive') loadReceived();
      if (currentPage === 'send') loadFiles(currentPath);
      break;
  }
}

function invalidateCache() { fileCache = {}; }

function updateConnDot() {
  const dot = document.getElementById('conn-dot');
  dot.className = 'nav-dot ' + (wsConnected ? 'online' : 'offline');
}

// ─── Polling (fallback) ───
function startPolling() { restartPolling(); }
function restartPolling() {
  clearInterval(refreshTimer);
  const interval = wsConnected ? POLL_WS : POLL_FALLBACK;
  refreshTimer = setInterval(() => {
    if (document.visibilityState === 'hidden' || uploading || downloadAbort) return;
    if (currentPage === 'send') loadFiles(currentPath);
    if (currentPage === 'receive') loadReceived();
    if (currentPage === 'home') loadInfo();
  }, interval);
}

// ─── File Loading ───
async function loadFiles(path) {
  currentPath = path;
  const listEl = document.getElementById('send-list');
  const countEl = document.getElementById('send-count');
  renderBreadcrumb(path);

  const cacheKey = 'send:' + path;
  const cached = fileCache[cacheKey];
  if (cached && Date.now() - cached.ts < FILE_CACHE_TTL) {
    renderFileList(cached.data, listEl, countEl, path, false);
    return;
  }

  // Skeleton
  listEl.innerHTML = Array(5).fill('<div class="skeleton skel-item"></div>').join('');
  countEl.textContent = '';

  try {
    const res = await fetch('/api/files?path=' + encodeURIComponent(path));
    const files = await res.json();
    fileCache[cacheKey] = { data: files, ts: Date.now() };
    renderFileList(files, listEl, countEl, path, false);
  } catch(e) {
    listEl.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Failed to load files</div><div class="empty-desc">${e.message}</div><button class="retry-btn" onclick="loadFiles('${path}')">Retry</button></div>`;
    countEl.textContent = '';
  }
}

async function loadReceived() {
  const listEl = document.getElementById('receive-list');
  const cacheKey = 'recv:uploads';
  const cached = fileCache[cacheKey];
  if (cached && Date.now() - cached.ts < FILE_CACHE_TTL) {
    renderFileList(cached.data, listEl, null, 'uploads', true);
    return;
  }
  listEl.innerHTML = Array(3).fill('<div class="skeleton skel-item"></div>').join('');
  try {
    const res = await fetch('/api/files?path=uploads');
    const files = await res.json();
    fileCache[cacheKey] = { data: files, ts: Date.now() };
    renderFileList(files, listEl, null, 'uploads', true);
  } catch(e) {
    listEl.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Failed to load</div><div class="empty-desc">${e.message}</div><button class="retry-btn" onclick="loadReceived()">Retry</button></div>`;
  }
}

// ─── Render File List ───
function renderFileList(files, container, countEl, basePath, isReceive) {
  if (!files.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">${isReceive ? '📥' : '📂'}</div><div class="empty-title">${isReceive ? 'No uploaded files yet' : 'This folder is empty'}</div><div class="empty-desc">${isReceive ? 'Upload files using the area above' : 'No files are being shared from this folder'}</div></div>`;
    if (countEl) countEl.textContent = '';
    return;
  }

  // Sort: folders first, then by name
  files.sort((a,b) => {
    if (a.type === 'folder' && b.type !== 'folder') return -1;
    if (a.type !== 'folder' && b.type === 'folder') return 1;
    return a.name.localeCompare(b.name);
  });

  const folders = files.filter(f => f.type === 'folder').length;
  const fileCount = files.length - folders;
  if (countEl) {
    const parts = [];
    if (folders) parts.push(folders + ' folder' + (folders > 1 ? 's' : ''));
    if (fileCount) parts.push(fileCount + ' file' + (fileCount > 1 ? 's' : ''));
    countEl.textContent = parts.join(', ');
  }

  container.innerHTML = files.map(file => {
    const fullPath = basePath === '/' ? file.name : basePath + '/' + file.name;
    const icon = getFileIcon(file);
    const isImage = file.type === 'image';
    const isFolder = file.type === 'folder';
    const showCheck = selectMode && !isFolder && !isReceive;
    const isSelected = selectedFiles.has(fullPath);

    let iconHtml;
    if (isImage) {
      const thumbUrl = '/api/thumbnail?path=' + encodeURIComponent(fullPath) + '&size=80';
      iconHtml = `<div class="file-icon"><img src="${thumbUrl}" loading="lazy" onerror="this.parentElement.innerHTML='🖼️'" alt=""></div>`;
    } else {
      iconHtml = `<div class="file-icon">${icon}</div>`;
    }

    let actionsHtml = '';
    if (!selectMode) {
      if (isReceive && !isFolder) {
        actionsHtml = `<div class="file-actions"><button class="btn-download" onclick="event.stopPropagation();handleFileClick('${esc(fullPath)}','${file.type}')">⬇</button><button class="btn-delete" onclick="event.stopPropagation();deleteFile('${esc(fullPath)}')">🗑</button></div>`;
      } else if (!isFolder) {
        actionsHtml = `<div class="file-actions"><button class="btn-download" onclick="event.stopPropagation();handleFileClick('${esc(fullPath)}','${file.type}')">⬇</button></div>`;
      }
    }

    const checkHtml = showCheck ? `<div class="file-check">${isSelected ? '✓' : ''}</div>` : '';

    let onclick;
    if (isFolder) {
      onclick = `loadFiles('${esc(fullPath)}')`;
    } else if (selectMode && !isReceive) {
      onclick = `toggleSelect('${esc(fullPath)}')`;
    } else {
      onclick = `handleFileClick('${esc(fullPath)}','${file.type}')`;
    }

    const longpress = (!isReceive && !isFolder && !selectMode) ? `oncontextmenu="event.preventDefault();enterSelectMode('${esc(fullPath)}')"` : '';

    return `<div class="file-item${isSelected ? ' selected' : ''}" onclick="${onclick}" ${longpress}>
      ${checkHtml}${iconHtml}
      <div class="file-info"><div class="file-name">${escHtml(file.name)}</div><div class="file-meta">${isFolder ? (file.items || 0) + ' items • ' : ''}${fmtSize(file.size)} • ${file.modified}</div></div>
      ${actionsHtml}
    </div>`;
  }).join('');
}

// ─── Multi-Select ───
function enterSelectMode(firstFile) {
  selectMode = true;
  selectedFiles.clear();
  selectedFiles.add(firstFile);
  document.body.classList.add('select-mode');
  document.getElementById('select-bar').classList.remove('hidden');
  // Haptic feedback
  if (navigator.vibrate) navigator.vibrate(30);
  updateSelectBar();
  // Re-render
  const cacheKey = 'send:' + currentPath;
  const cached = fileCache[cacheKey];
  if (cached) renderFileList(cached.data, document.getElementById('send-list'), document.getElementById('send-count'), currentPath, false);
}

function toggleSelect(path) {
  if (selectedFiles.has(path)) selectedFiles.delete(path);
  else selectedFiles.add(path);
  updateSelectBar();
  const cacheKey = 'send:' + currentPath;
  const cached = fileCache[cacheKey];
  if (cached) renderFileList(cached.data, document.getElementById('send-list'), document.getElementById('send-count'), currentPath, false);
}

function toggleSelectAll() {
  const cacheKey = 'send:' + currentPath;
  const cached = fileCache[cacheKey];
  if (!cached) return;
  const allFiles = cached.data.filter(f => f.type !== 'folder').map(f => currentPath === '/' ? f.name : currentPath + '/' + f.name);
  if (selectedFiles.size === allFiles.length) {
    selectedFiles.clear();
    document.getElementById('sel-all-btn').textContent = 'Select All';
  } else {
    allFiles.forEach(f => selectedFiles.add(f));
    document.getElementById('sel-all-btn').textContent = 'Deselect';
  }
  updateSelectBar();
  renderFileList(cached.data, document.getElementById('send-list'), document.getElementById('send-count'), currentPath, false);
}

function exitSelectMode() {
  selectMode = false;
  selectedFiles.clear();
  document.body.classList.remove('select-mode');
  document.getElementById('select-bar').classList.add('hidden');
  const cacheKey = 'send:' + currentPath;
  const cached = fileCache[cacheKey];
  if (cached) renderFileList(cached.data, document.getElementById('send-list'), document.getElementById('send-count'), currentPath, false);
}

function updateSelectBar() {
  document.getElementById('sel-count').textContent = selectedFiles.size + ' selected';
  const zipBtn = document.querySelector('.sel-zip-btn');
  if (zipBtn) zipBtn.textContent = '📦 ZIP (' + selectedFiles.size + ')';
  // Disable ZIP if nothing selected
  if (zipBtn) zipBtn.disabled = selectedFiles.size === 0;
}

async function downloadSelectedZip() {
  if (!selectedFiles.size) return;
  const filesList = Array.from(selectedFiles);

  // Use a hidden form POST — the server responds with Content-Disposition: attachment
  // which triggers the browser/WebView native download handler (no blob URL needed)
  const form = document.createElement('form');
  form.method = 'POST';
  form.action = '/api/download-zip';
  form.style.display = 'none';

  // Send files as a hidden input with JSON
  const input = document.createElement('input');
  input.type = 'hidden';
  input.name = 'files_json';
  input.value = JSON.stringify(filesList);
  form.appendChild(input);

  document.body.appendChild(form);

  showToast('📦 ZIP download starting — check your Downloads folder', 'success');
  form.submit();

  // Cleanup form after a brief delay
  setTimeout(() => { form.remove(); }, 1000);
  exitSelectMode();
}

// ─── File Click Handler ───
function handleFileClick(path, type) {
  if (type === 'image' || type === 'video' || type === 'audio') {
    openPreview(path, type);
  } else {
    downloadFile(path);
  }
}

// ─── Preview ───
function openPreview(path, type) {
  const overlay = document.getElementById('preview-overlay');
  overlay.classList.remove('hidden');
  const streamUrl = '/api/stream?path=' + encodeURIComponent(path);
  const fileName = path.split('/').pop();
  let mediaHtml = '';
  if (type === 'image') {
    mediaHtml = `<img class="preview-img" src="${streamUrl}" alt="${escHtml(fileName)}">`;
  } else if (type === 'video') {
    mediaHtml = `<video class="preview-media" src="${streamUrl}" controls autoplay playsinline></video>`;
  } else if (type === 'audio') {
    mediaHtml = `<div class="card" style="padding:30px;text-align:center"><div style="font-size:64px;margin-bottom:16px">🎵</div><div style="font-size:14px;font-weight:700;margin-bottom:16px">${escHtml(fileName)}</div><audio class="preview-media" src="${streamUrl}" controls autoplay style="width:100%;max-width:400px"></audio></div>`;
  }
  overlay.innerHTML = `
    <button class="preview-close" onclick="closePreview()">✕</button>
    ${mediaHtml}
    <div class="preview-actions">
      <button class="preview-dl-btn" onclick="closePreview();downloadFile('${esc(path)}')">⬇ Download</button>
    </div>`;
  overlay.onclick = (e) => { if (e.target === overlay) closePreview(); };
}

function closePreview() {
  const overlay = document.getElementById('preview-overlay');
  overlay.classList.add('hidden');
  overlay.innerHTML = '';
}

// ─── Download ───
function downloadFile(path) {
  const fileName = path.split('/').pop();
  // Direct link download — triggers WebView's DownloadListener (saves to Downloads/LAN Beam/)
  // Also works in external browsers via native download
  const a = document.createElement('a');
  a.href = '/api/download?path=' + encodeURIComponent(path);
  a.download = fileName;
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  a.remove();
  showToast('⬇ Downloading: ' + fileName + ' → Downloads/LAN Beam/', 'success');
}

function showLargeDownloadOverlay(name) {
  const overlay = document.getElementById('dl-overlay');
  overlay.classList.remove('hidden');
  overlay.innerHTML = `<div class="dl-card dl-done"><div class="dl-icon">⬇️</div><div class="dl-title">Download Started</div><div class="dl-subtitle">${escHtml(name)}</div><div style="font-size:12px;color:var(--text2);margin-bottom:14px">Check your browser's notification bar for progress</div><button class="dl-cancel" onclick="closeDlOverlay()">OK</button></div>`;
  setTimeout(closeDlOverlay, 4000);
}

async function streamDownload(path, fileName, totalSize) {
  const overlay = document.getElementById('dl-overlay');
  overlay.classList.remove('hidden');
  const controller = new AbortController();
  downloadAbort = controller;

  overlay.innerHTML = `<div class="dl-card"><div class="dl-icon">⬇️</div><div class="dl-title">Downloading</div><div class="dl-subtitle">${escHtml(fileName)}</div><div class="dl-progress"><div class="dl-progress-bar" id="dl-bar" style="width:0%"></div></div><div class="dl-stats"><span id="dl-speed">--</span><span id="dl-pct">0%</span><span id="dl-eta">--</span></div><button class="dl-cancel" onclick="cancelDownload()">Cancel</button></div>`;

  try {
    const res = await fetch('/api/download?path=' + encodeURIComponent(path), { signal: controller.signal });
    const total = parseInt(res.headers.get('content-length')) || totalSize;
    const reader = res.body.getReader();
    const chunks = [];
    let received = 0;
    let lastTime = Date.now(), lastBytes = 0;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
      received += value.length;
      const now = Date.now();
      const dt = (now - lastTime) / 1000;
      if (dt >= 0.5) {
        const speed = (received - lastBytes) / dt;
        document.getElementById('dl-speed').textContent = fmtSize(speed) + '/s';
        const eta = total > 0 ? Math.ceil((total - received) / speed) : 0;
        document.getElementById('dl-eta').textContent = eta > 0 ? fmtTime(eta) : '--';
        lastTime = now; lastBytes = received;
      }
      if (total > 0) {
        const pct = Math.round(received / total * 100);
        document.getElementById('dl-bar').style.width = pct + '%';
        document.getElementById('dl-pct').textContent = pct + '%';
      }
    }

    const blob = new Blob(chunks);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = fileName;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    closeDlOverlay();
    showToast('✅ Downloaded: ' + fileName, 'success');
  } catch(e) {
    if (e.name === 'AbortError') {
      showToast('Download cancelled', 'error');
    } else {
      overlay.innerHTML = `<div class="dl-card"><div class="dl-icon">⚠️</div><div class="dl-title">Download Failed</div><div class="dl-subtitle">${e.message}</div><button class="dl-cancel" onclick="closeDlOverlay()">Close</button></div>`;
    }
  } finally {
    downloadAbort = null;
  }
}

function cancelDownload() {
  if (downloadAbort) downloadAbort.abort();
  closeDlOverlay();
}

function closeDlOverlay() {
  document.getElementById('dl-overlay').classList.add('hidden');
  document.getElementById('dl-overlay').innerHTML = '';
}

// ─── Delete ───
async function deleteFile(path) {
  if (!confirm('Delete this file?')) return;
  try {
    const res = await fetch('/api/file?path=' + encodeURIComponent(path), { method: 'DELETE' });
    if (res.ok) {
      showToast('🗑 File deleted', 'success');
      invalidateCache();
      loadReceived();
    } else {
      showToast('Failed to delete', 'error');
    }
  } catch(e) { showToast('Delete error: ' + e.message, 'error'); }
}

// ─── Breadcrumb ───
function renderBreadcrumb(path) {
  const bc = document.getElementById('breadcrumb');
  const parts = path.split('/').filter(Boolean);
  let html = '';
  if (parts.length > 0) {
    html += `<button class="back-btn" onclick="loadFiles('${parts.length > 1 ? esc(parts.slice(0, -1).join('/')) : '/'}')">← Back</button>`;
  }
  html += `<button onclick="loadFiles('/')">🏠 Home</button>`;
  let cumPath = '';
  parts.forEach((p, i) => {
    cumPath += (cumPath ? '/' : '') + p;
    html += `<span class="sep">/</span><button onclick="loadFiles('${esc(cumPath)}')">${escHtml(p)}</button>`;
  });
  bc.innerHTML = html;
}

// ─── Upload ───
function setupUploadZone() {
  const zone = document.getElementById('upload-zone');
  const input = document.getElementById('file-input');

  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('dragover');
    addToQueue(Array.from(e.dataTransfer.files));
  });
  input.addEventListener('change', () => {
    addToQueue(Array.from(input.files));
    input.value = '';
  });
}

function addToQueue(files) {
  files.forEach(f => uploadQueue.push({ file: f, progress: 0, done: false, error: false }));
  renderUploadQueue();
}

function removeFromQueue(i) {
  uploadQueue.splice(i, 1);
  if (!uploadQueue.length) {
    document.getElementById('upload-queue-wrap').classList.add('hidden');
    document.getElementById('upload-start-btn').classList.add('hidden');
    document.getElementById('upload-progress-wrap').classList.add('hidden');
  }
  renderUploadQueue();
}

function clearQueue() {
  uploadQueue = [];
  document.getElementById('upload-queue-wrap').classList.add('hidden');
  document.getElementById('upload-start-btn').classList.add('hidden');
  document.getElementById('upload-progress-wrap').classList.add('hidden');
}

function renderUploadQueue() {
  if (!uploadQueue.length) return;
  const wrap = document.getElementById('upload-queue-wrap');
  wrap.classList.remove('hidden');
  document.getElementById('upload-start-btn').classList.remove('hidden');

  wrap.innerHTML = `<div class="upload-q-header"><span class="upload-q-title">📎 ${uploadQueue.length} file(s) queued</span><button class="upload-q-clear" onclick="clearQueue()">Clear All</button></div>` +
    uploadQueue.map((item, i) => {
      const icon = getFileIconByName(item.file.name);
      const statusClass = item.done ? ' uq-done' : '';
      return `<div class="uq-item${statusClass}"><div class="uq-icon">${icon}</div><div class="uq-info"><div class="uq-name">${escHtml(item.file.name)}</div><div class="uq-size">${fmtSize(item.file.size)}</div><div class="uq-progress"><div class="uq-progress-bar" style="width:${item.progress}%"></div></div></div>${!uploading ? `<button class="uq-remove" onclick="removeFromQueue(${i})">✕</button>` : ''}</div>`;
    }).join('');
}

async function startUpload() {
  if (!uploadQueue.length || uploading) return;
  uploading = true;
  document.getElementById('upload-start-btn').disabled = true;
  const progWrap = document.getElementById('upload-progress-wrap');
  progWrap.classList.remove('hidden');

  let completed = 0;
  for (let i = 0; i < uploadQueue.length; i++) {
    const item = uploadQueue[i];
    try {
      await uploadSingleFile(item, i);
      item.done = true;
    } catch(e) {
      item.error = true;
    }
    completed++;
    const pct = Math.round(completed / uploadQueue.length * 100);
    progWrap.innerHTML = `<div class="upload-progress"><div class="up-status"><span>Uploading ${completed}/${uploadQueue.length}</span><span>${pct}%</span></div><div class="up-bar"><div class="up-bar-fill" style="width:${pct}%"></div></div></div>`;
    renderUploadQueue();
  }

  uploading = false;
  document.getElementById('upload-start-btn').disabled = false;
  showToast(`✅ Uploaded ${completed} file(s)`, 'success');
  invalidateCache();
  loadReceived();
  setTimeout(() => { uploadQueue = []; clearQueue(); }, 2000);
}

function uploadSingleFile(item, index) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/upload');
    const fd = new FormData();
    fd.append('file', item.file, item.file.name);
    xhr.upload.onprogress = (e) => {
      if (e.lengthComputable) {
        item.progress = Math.round(e.loaded / e.total * 100);
        renderUploadQueue();
      }
    };
    xhr.onload = () => { item.progress = 100; resolve(); };
    xhr.onerror = () => reject(new Error('Upload failed'));
    xhr.send(fd);
  });
}

// ─── Copy URL ───
function copyUrl() {
  const url = serverInfo.url || 'http://127.0.0.1:8765';
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => animateCopy());
  } else {
    const ta = document.createElement('textarea'); ta.value = url;
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    ta.remove(); animateCopy();
  }
}
function animateCopy() {
  const bar = document.getElementById('url-bar');
  const icon = document.getElementById('copy-icon');
  bar.classList.add('copied'); icon.textContent = '✅';
  showToast('📋 URL Copied!', 'success');
  setTimeout(() => { bar.classList.remove('copied'); icon.textContent = '📋'; }, 2000);
}

// ─── Helpers ───
function fmtSize(bytes) {
  if (!bytes || bytes <= 0) return '0 B';
  const u = ['B','KB','MB','GB','TB'];
  const i = Math.floor(Math.log(bytes) / Math.log(1024));
  return (bytes / Math.pow(1024, i)).toFixed(i > 0 ? 1 : 0) + ' ' + u[i];
}
function fmtTime(sec) {
  if (sec < 60) return sec + 's';
  if (sec < 3600) return Math.floor(sec/60) + 'm ' + (sec%60) + 's';
  return Math.floor(sec/3600) + 'h ' + Math.floor((sec%3600)/60) + 'm';
}
function esc(s) { return s.replace(/'/g, "\\'").replace(/\\/g, "\\\\"); }
function escHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function getFileIcon(file) {
  const icons = { folder:'📁', video:'📹', audio:'🎵', image:'🖼️', pdf:'📑', archive:'📦', apk:'📱', doc:'📄' };
  return icons[file.type] || '📄';
}
function getFileIconByName(name) {
  const ext = name.split('.').pop().toLowerCase();
  const map = { mp4:'📹',mkv:'📹',mov:'📹',avi:'📹',webm:'📹',mp3:'🎵',flac:'🎵',wav:'🎵',m4a:'🎵',aac:'🎵',ogg:'🎵',jpg:'🖼️',jpeg:'🖼️',png:'🖼️',gif:'🖼️',webp:'🖼️',svg:'🖼️',heic:'🖼️',pdf:'📑',zip:'📦',tar:'📦',gz:'📦',rar:'📦','7z':'📦',apk:'📱' };
  return map[ext] || '📄';
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || '');
  requestAnimationFrame(() => { t.classList.add('show'); });
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}
