name: Build & Publish Release APK

on:
  push:
    tags:
      - 'v*' # Triggers on any tag push matching v1.0, v1.1, etc.

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK
        run: ./gradlew assembleRelease
        continue-on-error: true # Safe if signing configs are not yet set up for release builds

      - name: Locate APKs
        run: |
          mkdir -p build-artifacts
          cp app/build/outputs/apk/debug/app-debug.apk build-artifacts/LAN-Beam-${{ github.ref_name }}-debug.apk
          if [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            cp app/build/outputs/apk/release/app-release-unsigned.apk build-artifacts/LAN-Beam-${{ github.ref_name }}-release-unsigned.apk
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build-artifacts/LAN-Beam-*.apk
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
